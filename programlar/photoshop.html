<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshop Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #535353;
            color: #e8e8e8;
            overflow: hidden;
            height: 100vh;
        }

        /* Top Menu Bar */
        .menu-bar {
            background: #464646;
            border-bottom: 1px solid #2c2c2c;
            padding: 8px 12px;
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .menu-item {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: #5a5a5a;
        }

        /* Main Container */
        .container {
            display: flex;
            height: calc(100vh - 41px);
        }

        /* Left Toolbar */
        .toolbar {
            width: 60px;
            background: #2c2c2c;
            border-right: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
            padding: 10px 5px;
            gap: 5px;
        }

        .tool-btn {
            width: 50px;
            height: 50px;
            background: #464646;
            border: 1px solid #1e1e1e;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #5a5a5a;
            border-color: #6a6a6a;
        }

        .tool-btn.active {
            background: #1473e6;
            border-color: #0d66d0;
        }

        /* Canvas Area */
        .canvas-area {
            flex: 1;
            background: #535353;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
        }

        #canvas {
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        /* Right Panel */
        .right-panel {
            width: 280px;
            background: #2c2c2c;
            border-left: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        .panel-section {
            border-bottom: 1px solid #1e1e1e;
            padding: 12px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: #b8b8b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Color Picker */
        .color-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-box {
            width: 50px;
            height: 50px;
            border: 2px solid #1e1e1e;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        #colorPicker {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Layers Panel */
        .layers-panel {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .layer-item {
            background: #464646;
            border: 1px solid #1e1e1e;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .layer-item:hover {
            background: #5a5a5a;
        }

        .layer-item.active {
            border-color: #1473e6;
            background: #3a4a5a;
        }

        /* Properties Panel */
        .property-group {
            margin-bottom: 15px;
        }

        .property-label {
            font-size: 11px;
            color: #b8b8b8;
            margin-bottom: 5px;
        }

        .slider {
            width: 100%;
            height: 4px;
            background: #1e1e1e;
            border-radius: 2px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            width: 14px;
            height: 14px;
            background: #1473e6;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            background: #464646;
            border: 1px solid #1e1e1e;
            color: #e8e8e8;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #5a5a5a;
        }

        .btn-primary {
            background: #1473e6;
            border-color: #0d66d0;
        }

        .btn-primary:hover {
            background: #0d66d0;
        }

        /* File Input */
        .file-input {
            display: none;
        }

        /* Top Options Bar */
        .options-bar {
            background: #464646;
            border-bottom: 1px solid #2c2c2c;
            padding: 8px 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 12px;
        }

        input[type="number"] {
            width: 60px;
            background: #2c2c2c;
            border: 1px solid #1e1e1e;
            color: #e8e8e8;
            padding: 4px 8px;
            border-radius: 3px;
        }

        select {
            background: #2c2c2c;
            border: 1px solid #1e1e1e;
            color: #e8e8e8;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .text-input-overlay {
            position: absolute;
            display: none;
        }

        .text-input-box {
            background: rgba(255,255,255,0.95);
            border: 2px solid #1473e6;
            padding: 10px;
            border-radius: 4px;
        }

        .text-input-box input {
            width: 300px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .text-input-box button {
            margin-left: 5px;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <!-- Menu Bar -->
    <div class="menu-bar">
        <div class="menu-item" onclick="openFile()">📁 File</div>
        <div class="menu-item" onclick="saveImage()">💾 Save</div>
        <div class="menu-item" onclick="undo()">↶ Undo</div>
        <div class="menu-item" onclick="redo()">↷ Redo</div>
        <div class="menu-item" onclick="clearCanvas()">🗑️ Clear</div>
    </div>

    <!-- Options Bar -->
    <div class="options-bar">
        <label>Brush Size: <input type="number" id="brushSize" value="5" min="1" max="100"></label>
        <label>Opacity: <input type="number" id="opacity" value="100" min="1" max="100">%</label>
        <label>Font Size: <input type="number" id="fontSize" value="24" min="8" max="200">px</label>
    </div>

    <div class="container">
        <!-- Left Toolbar -->
        <div class="toolbar">
            <div class="tool-btn active" onclick="selectTool('brush')" title="Brush (B)">🖌️</div>
            <div class="tool-btn" onclick="selectTool('eraser')" title="Eraser (E)">🧹</div>
            <div class="tool-btn" onclick="selectTool('text')" title="Text (T)">A</div>
            <div class="tool-btn" onclick="selectTool('move')" title="Move (V)">✋</div>
            <div class="tool-btn" onclick="selectTool('fill')" title="Fill (G)">🪣</div>
            <div class="tool-btn" onclick="applyFilter('blur')" title="Blur">💫</div>
            <div class="tool-btn" onclick="applyFilter('grayscale')" title="Grayscale">⚫</div>
            <div class="tool-btn" onclick="applyFilter('invert')" title="Invert">🔄</div>
        </div>

        <!-- Canvas Area -->
        <div class="canvas-area">
            <canvas id="canvas" width="1200" height="800"></canvas>
            <div class="text-input-overlay" id="textInput">
                <div class="text-input-box">
                    <input type="text" id="textValue" placeholder="Enter text...">
                    <button class="btn btn-primary" onclick="addText()">Add</button>
                    <button class="btn" onclick="cancelText()">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <!-- Color Section -->
            <div class="panel-section">
                <div class="panel-title">Color</div>
                <div class="color-section">
                    <div class="color-box" style="background: #000000;">
                        <input type="color" id="colorPicker" value="#000000">
                    </div>
                    <div>
                        <div style="font-size: 11px; color: #b8b8b8;">Foreground</div>
                        <div id="colorHex" style="font-size: 12px; margin-top: 4px;">#000000</div>
                    </div>
                </div>
            </div>

            <!-- Properties Section -->
            <div class="panel-section">
                <div class="panel-title">Properties</div>
                
                <div class="property-group">
                    <div class="property-label">Brush Size</div>
                    <input type="range" class="slider" id="brushSlider" min="1" max="100" value="5">
                    <div style="font-size: 11px; margin-top: 3px;" id="brushValue">5px</div>
                </div>

                <div class="property-group">
                    <div class="property-label">Opacity</div>
                    <input type="range" class="slider" id="opacitySlider" min="1" max="100" value="100">
                    <div style="font-size: 11px; margin-top: 3px;" id="opacityValue">100%</div>
                </div>
            </div>

            <!-- Layers Section -->
            <div class="panel-section" style="flex: 1; display: flex; flex-direction: column;">
                <div class="panel-title">Layers</div>
                <div class="layers-panel" id="layersPanel">
                    <div class="layer-item active">
                        <span>🖼️ Background</span>
                        <span style="font-size: 11px; color: #888;">100%</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addLayer()" style="margin-top: 10px;">+ New Layer</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept="image/*">

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentTool = 'brush';
        let currentColor = '#000000';
        let brushSize = 5;
        let opacity = 1;
        let history = [];
        let historyStep = -1;
        let layers = [{id: 1, name: 'Background', visible: true, opacity: 1}];
        let currentLayer = 0;

        // Initialize
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();

        // Color Picker
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            currentColor = e.target.value;
            document.getElementById('colorHex').textContent = currentColor.toUpperCase();
            document.querySelector('.color-box').style.background = currentColor;
        });

        // Sliders
        document.getElementById('brushSlider').addEventListener('input', (e) => {
            brushSize = e.target.value;
            document.getElementById('brushValue').textContent = brushSize + 'px';
            document.getElementById('brushSize').value = brushSize;
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            opacity = e.target.value / 100;
            document.getElementById('opacityValue').textContent = e.target.value + '%';
            document.getElementById('opacity').value = e.target.value;
        });

        document.getElementById('brushSize').addEventListener('input', (e) => {
            brushSize = e.target.value;
            document.getElementById('brushSlider').value = brushSize;
            document.getElementById('brushValue').textContent = brushSize + 'px';
        });

        document.getElementById('opacity').addEventListener('input', (e) => {
            opacity = e.target.value / 100;
            document.getElementById('opacitySlider').value = e.target.value;
            document.getElementById('opacityValue').textContent = e.target.value + '%';
        });

        // Tool Selection
        function selectTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tool-btn').classList.add('active');
            
            if (tool === 'text') {
                canvas.style.cursor = 'text';
            } else if (tool === 'move') {
                canvas.style.cursor = 'move';
            } else if (tool === 'fill') {
                canvas.style.cursor = 'pointer';
            } else {
                canvas.style.cursor = 'crosshair';
            }
        }

        // Drawing
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        function startDrawing(e) {
            if (currentTool === 'text') {
                showTextInput(e);
                return;
            }
            
            if (currentTool === 'fill') {
                fillCanvas();
                return;
            }

            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function draw(e) {
            if (!isDrawing || currentTool === 'text' || currentTool === 'fill') return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.globalAlpha = opacity;
            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'brush') {
                ctx.strokeStyle = currentColor;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'eraser') {
                ctx.strokeStyle = 'white';
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                saveState();
            }
        }

        // Fill Tool
        function fillCanvas() {
            ctx.globalAlpha = opacity;
            ctx.fillStyle = currentColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
            saveState();
        }

        // Text Tool
        function showTextInput(e) {
            const textInput = document.getElementById('textInput');
            const rect = canvas.getBoundingClientRect();
            textInput.style.left = (e.clientX - rect.left) + 'px';
            textInput.style.top = (e.clientY - rect.top) + 'px';
            textInput.style.display = 'block';
            document.getElementById('textValue').focus();
            
            textInput.dataset.x = e.clientX - rect.left;
            textInput.dataset.y = e.clientY - rect.top;
        }

        function addText() {
            const text = document.getElementById('textValue').value;
            const fontSize = document.getElementById('fontSize').value;
            const x = parseFloat(document.getElementById('textInput').dataset.x);
            const y = parseFloat(document.getElementById('textInput').dataset.y);

            if (text) {
                ctx.globalAlpha = opacity;
                ctx.font = `${fontSize}px Arial`;
                ctx.fillStyle = currentColor;
                ctx.fillText(text, x, y);
                ctx.globalAlpha = 1;
                saveState();
            }

            cancelText();
        }

        function cancelText() {
            document.getElementById('textInput').style.display = 'none';
            document.getElementById('textValue').value = '';
        }

        // Filters
        function applyFilter(filter) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            if (filter === 'grayscale') {
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    data[i] = avg;
                    data[i + 1] = avg;
                    data[i + 2] = avg;
                }
            } else if (filter === 'invert') {
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = 255 - data[i];
                    data[i + 1] = 255 - data[i + 1];
                    data[i + 2] = 255 - data[i + 2];
                }
            } else if (filter === 'blur') {
                ctx.filter = 'blur(4px)';
                ctx.drawImage(canvas, 0, 0);
                ctx.filter = 'none';
                saveState();
                return;
            }

            ctx.putImageData(imageData, 0, 0);
            saveState();
        }

        // History
        function saveState() {
            historyStep++;
            if (historyStep < history.length) {
                history.length = historyStep;
            }
            history.push(canvas.toDataURL());
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => ctx.drawImage(img, 0, 0);
            }
        }

        // File Operations
        function openFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        saveState();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'photoshop-export.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function clearCanvas() {
            if (confirm('Clear entire canvas?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
            }
        }

        // Layers
        function addLayer() {
            const newLayer = {
                id: layers.length + 1,
                name: `Layer ${layers.length}`,
                visible: true,
                opacity: 1
            };
            layers.push(newLayer);
            updateLayersPanel();
        }

        function updateLayersPanel() {
            const panel = document.getElementById('layersPanel');
            panel.innerHTML = layers.map((layer, index) => `
                <div class="layer-item ${index === currentLayer ? 'active' : ''}" onclick="selectLayer(${index})">
                    <span>${layer.visible ? '👁️' : '🚫'} ${layer.name}</span>
                    <span style="font-size: 11px; color: #888;">${Math.round(layer.opacity * 100)}%</span>
                </div>
            `).reverse().join('');
        }

        function selectLayer(index) {
            currentLayer = index;
            updateLayersPanel();
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key === 'y') {
                    e.preventDefault();
                    redo();
                } else if (e.key === 's') {
                    e.preventDefault();
                    saveImage();
                }
            } else {
                if (e.key === 'b') selectTool('brush');
                if (e.key === 'e') selectTool('eraser');
                if (e.key === 't') selectTool('text');
                if (e.key === 'v') selectTool('move');
                if (e.key === 'g') selectTool('fill');
            }
        });

        // Enter key for text input
        document.getElementById('textValue').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addText();
            }
        });
    </script>
</body>
</html>
