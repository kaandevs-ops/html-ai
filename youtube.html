<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Roboto", Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* ========== HEADER ========== */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 2000;
            border-bottom: 1px solid #272727;
        }

        .header-left, .header-center, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-left {
            flex: 0 0 auto;
        }

        .header-center {
            flex: 1;
            max-width: 640px;
            margin: 0 40px;
        }

        .header-right {
            flex: 0 0 auto;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #fff;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: #272727;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        #logo {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 18px 14px 18px 16px;
            margin-left: -14px;
        }

        #logo svg {
            width: 90px;
            height: 20px;
        }

        .search-container {
            display: flex;
            flex: 1;
        }

        #searchInput {
            flex: 1;
            height: 40px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 0 16px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        #searchInput:focus {
            border-color: #1c62b9;
            background: #0f0f0f;
        }

        #searchBtn {
            width: 64px;
            height: 40px;
            background: #222222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        #searchBtn:hover {
            background: #2f2f2f;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09, #0cf);
            cursor: pointer;
        }

        /* ========== SIDEBAR ========== */
        #sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            width: 240px;
            height: calc(100vh - 56px);
            background: #0f0f0f;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 1000;
            transition: transform 0.2s;
            padding: 12px 0;
        }

        #sidebar::-webkit-scrollbar {
            width: 8px;
        }

        #sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: #717171;
            border-radius: 4px;
        }

        #sidebar.collapsed {
            transform: translateX(-240px);
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 12px;
            height: 40px;
            cursor: pointer;
            border-radius: 10px;
            margin: 0 8px 4px 8px;
            transition: background 0.2s;
            font-size: 14px;
            font-weight: 400;
        }

        .sidebar-item:hover {
            background: #272727;
        }

        .sidebar-item.active {
            background: #272727;
            font-weight: 500;
        }

        .sidebar-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .sidebar-divider {
            height: 1px;
            background: #272727;
            margin: 12px 0;
        }

        /* ========== MAIN CONTENT ========== */
        #mainContent {
            margin-top: 56px;
            margin-left: 240px;
            padding: 24px;
            transition: margin-left 0.2s;
        }

        #mainContent.expanded {
            margin-left: 0;
        }

        /* ========== VIDEO GRID ========== */
        #videoGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px 16px;
            margin-bottom: 40px;
        }

        .video-card {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
        }

        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 3px 4px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: 500;
        }

        .video-info {
            display: flex;
            gap: 12px;
            padding: 12px 0 0 0;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09, #0cf);
            flex-shrink: 0;
        }

        .video-details {
            flex: 1;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            max-height: 40px;
            overflow: hidden;
            margin-bottom: 4px;
            color: #fff;
        }

        .video-meta {
            font-size: 12px;
            color: #aaa;
            line-height: 18px;
        }

        .channel-name {
            color: #aaa;
        }

        .channel-name:hover {
            color: #fff;
        }

        /* ========== VIDEO PLAYER PAGE ========== */
        #playerPage {
            display: none;
            margin-top: 56px;
            margin-left: 240px;
            padding: 24px;
            transition: margin-left 0.2s;
        }

        #playerPage.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        #playerPage.expanded {
            margin-left: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-container {
            display: flex;
            gap: 24px;
        }

        .player-primary {
            flex: 1;
            max-width: calc(100% - 426px);
        }

        .player-secondary {
            width: 402px;
            flex-shrink: 0;
        }

        #videoPlayer {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            outline: none;
        }

        .video-player-info {
            margin-top: 16px;
        }

        .player-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .player-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #272727;
            margin-bottom: 12px;
        }

        .channel-info-player {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: #272727;
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #3f3f3f;
        }

        .back-btn {
            background: #272727;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #3f3f3f;
        }

        /* ========== UPLOAD MODAL ========== */
        #uploadModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }

        #uploadModal.active {
            display: flex;
        }

        .modal-content {
            background: #282828;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 24px;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #3f3f3f;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 500;
        }

        .close-modal {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
        }

        .upload-area {
            border: 2px dashed #3f3f3f;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-area:hover {
            border-color: #717171;
        }

        .upload-area.drag-over {
            border-color: #065fd4;
            background: rgba(6, 95, 212, 0.1);
        }

        #fileInput {
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #121212;
            border: 1px solid #3f3f3f;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #065fd4;
        }

        .upload-btn {
            width: 100%;
            padding: 12px;
            background: #065fd4;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #0b7ae5;
        }

        .upload-btn:disabled {
            background: #3f3f3f;
            cursor: not-allowed;
        }

        .preview-video {
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1312px) {
            #videoGrid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 1024px) {
            .player-container {
                flex-direction: column;
            }
            
            .player-primary {
                max-width: 100%;
            }
            
            .player-secondary {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-240px);
            }

            #sidebar.active {
                transform: translateX(0);
            }

            #mainContent {
                margin-left: 0;
            }

            #playerPage {
                margin-left: 0;
            }

            #videoGrid {
                grid-template-columns: 1fr;
            }

            .header-center {
                margin: 0 8px;
            }
        }
    </style>
</head>

    <aside id="sidebar">
        <div class="sidebar-item active">

    <script>
        // ==================== STATE MANAGEMENT ====================

        // ==================== INITIAL SAMPLE VIDEOS ====================

            }
        ];

        // ==================== INITIALIZATION ====================
        function init() {
            // Load videos from localStorage or use sample videos
            const stored = localStorage.getItem('youtube_videos');
            STATE.videos = stored ? JSON.parse(stored) : SAMPLE_VIDEOS;
            
            renderVideos();
            setupEventListeners();
        }

        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            // Menu toggle
            document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
            
            // Upload modal
            document.getElementById('uploadBtn').addEventListener('click', openUploadModal);
            document.getElementById('closeModal').addEventListener('click', closeUploadModal);
            
            // File upload
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);
            
            // Drag and drop
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('drag-over');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('drag-over');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('video/')) {
                    handleFileSelect({ target: { files } });
                }
            });
            
            // Submit upload
            document.getElementById('submitUpload').addEventListener('click', submitVideo);
            
            // Back button
            document.getElementById('backBtn').addEventListener('click', closePlayer);
            
            // Logo click
            document.getElementById('logo').addEventListener('click', () => {
                closePlayer();
                renderVideos();
            });
        }

        // ==================== SIDEBAR ====================
        function toggleSidebar() {
            STATE.sidebarOpen = !STATE.sidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const playerPage = document.getElementById('playerPage');
            
            if (STATE.sidebarOpen) {
                sidebar.classList.remove('collapsed');
                mainContent.classList.remove('expanded');
                playerPage.classList.remove('expanded');
            } else {
                sidebar.classList.add('collapsed');
                mainContent.classList.add('expanded');
                playerPage.classList.add('expanded');
            }
        }

        // ==================== VIDEO RENDERING ====================
        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            STATE.videos.forEach(video => {
                const card = createVideoCard(video);
                grid.appendChild(card);
            });
        }

        function createVideoCard(video) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="thumbnail-container">
                    ${video.videoUrl ? 
                        `<video class="thumbnail" src="${video.videoUrl}" muted></video>` :
                        `<img class="thumbnail" src="${video.thumbnail}" alt="${video.title}">`
                    }
                    <span class="duration">${video.duration}</span>
                </div>
                <div class="video-info">
                    <div class="channel-avatar"></div>
                    <div class="video-details">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">
                            <div class="channel-name">${video.channel}</div>
                            <div>${video.views} • ${video.time}</div>
                        </div>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', () => playVideo(video));
            
            return card;
        }

        // ==================== VIDEO PLAYER ====================
        function playVideo(video) {
            STATE.currentVideo = video;
            
            // Hide main content, show player
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('playerPage').classList.add('active');
            
            // Set video source
            const player = document.getElementById('videoPlayer');
            if (video.videoUrl) {
                player.src = video.videoUrl;
                player.load();
                player.play().catch(e => console.log('Autoplay prevented'));
            } else {
                // For demo videos without actual video file
                player.src = '';
                player.poster = video.thumbnail;
            }
            
            // Set video info
            document.getElementById('playerTitle').textContent = video.title;
            document.getElementById('playerChannel').textContent = video.channel;
            document.getElementById('playerViews').textContent = `${video.views} • ${video.time}`;
            
            // Render related videos
            renderRelatedVideos(video);
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        function renderRelatedVideos(currentVideo) {
            const container = document.getElementById('relatedVideos');
            container.innerHTML = '';
            
            const related = STATE.videos.filter(v => v.id !== currentVideo.id).slice(0, 10);
            
            related.forEach(video => {
                const item = document.createElement('div');
                item.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.2s;';
                item.innerHTML = `
                    <div style="position: relative; width: 168px; height: 94px; flex-shrink: 0; background: #181818; border-radius: 8px; overflow: hidden;">
                        ${video.videoUrl ? 
                            `<video style="width: 100%; height: 100%; object-fit: cover;" src="${video.videoUrl}" muted></video>` :
                            `<img style="width: 100%; height: 100%; object-fit: cover;" src="${video.thumbnail}" alt="${video.title}">`
                        }
                        <span style="position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); padding: 2px 4px; border-radius: 2px; font-size: 12px; font-weight: 500;">${video.duration}</span>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 14px; font-weight: 500; line-height: 20px; max-height: 40px; overflow: hidden; margin-bottom: 4px;">${video.title}</div>
                        <div style="font-size: 12px; color: #aaa; line-height: 18px;">${video.channel}</div>
                        <div style="font-size: 12px; color: #aaa; line-height: 18px;">${video.views}</div>
                    </div>
                `;
                
                item.addEventListener('mouseenter', () => item.style.background = '#272727');
                item.addEventListener('mouseleave', () => item.style.background = 'transparent');
                item.addEventListener('click', () => playVideo(video));
                
                container.appendChild(item);
            });
        }

        function closePlayer() {
            document.getElementById('playerPage').classList.remove('active');
            document.getElementById('mainContent').style.display = 'block';
            
            const player = document.getElementById('videoPlayer');
            player.pause();
            player.src = '';
        }

        // ==================== UPLOAD MODAL ====================
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
            resetUploadForm();
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
            resetUploadForm();
        }

        function resetUploadForm() {
            document.getElementById('fileInput').value = '';
            document.getElementById('videoTitle').value = '';
            document.getElementById('channelName').value = 'Benim Kanalım';
            document.getElementById('previewVideo').style.display = 'none';
            document.getElementById('submitUpload').disabled = true;
            STATE.uploadedFile = null;
        }

        // ==================== FILE HANDLING ====================
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('video/')) {
                alert('Lütfen geçerli bir video dosyası seçin.');
                return;
            }
            
            STATE.uploadedFile = file;
            
            // Preview video
            const preview = document.getElementById('previewVideo');
            const url = URL.createObjectURL(file);
            preview.src = url;
            preview.style.display = 'block';
            
            // Auto-fill title
            const title = document.getElementById('videoTitle');
            if (!title.value) {
                title.value = file.name.replace(/\.[^/.]+$/, "");
            }
            
            // Enable submit button
            document.getElementById('submitUpload').disabled = false;
        }

        // ==================== VIDEO UPLOAD ====================
        function submitVideo() {
            const title = document.getElementById('videoTitle').value.trim();
            const channel = document.getElementById('channelName').value.trim();
            
            if (!title || !channel || !STATE.uploadedFile) {
                alert('Lütfen tüm alanları doldurun.');
                return;
            }
            
            // Create video URL from file
            const videoUrl = URL.createObjectURL(STATE.uploadedFile);
            
            // Generate thumbnail from video
            generateThumbnail(videoUrl).then(thumbnail => {
                const newVideo = {
                    id: Date.now(),
                    title: title,
                    channel: channel,
                    views: '0 görüntüleme',
                    time: 'Az önce',
                    duration: '00:00',
                    thumbnail: thumbnail,
                    videoUrl: videoUrl,
                    uploaded: true
                };
                
                // Add to beginning of video list
                STATE.videos.unshift(newVideo);
                
                // Save to localStorage (without video URL for storage limits)
                const videosToStore = STATE.videos.map(v => ({
                    ...v,
                    videoUrl: v.uploaded ? '[UPLOADED_VIDEO]' : v.videoUrl
                }));
                localStorage.setItem('youtube_videos', JSON.stringify(videosToStore));
                
                // Re-render
                renderVideos();
                
                // Close modal
                closeUploadModal();
                
                // Show success message
                alert('Video başarıyla yüklendi!');
            });
        }

        function generateThumbnail(videoUrl) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.src = videoUrl;
                video.crossOrigin = 'anonymous';
                
                video.addEventListener('loadeddata', () => {
                    video.currentTime = 1; // Get frame at 1 second
                });
                
                video.addEventListener('seeked', () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 320;
                    canvas.height = 180;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, 320, 180);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                });
                
                video.load();
            });
        }

        // ==================== START APPLICATION ====================
        init();
        window.addEventListener('message', function(e) {
            const data = e.data;
            if (!data) return;

            // 1. Arama Komutu
            if (data.action === 'SEARCH') {
                const input = document.getElementById('searchInput');
                const btn = document.getElementById('searchBtn');
                if (input && btn) {
                    input.value = data.query;
                    btn.click(); // Ara butonuna tıkla
                }
            }
            // 2. Ana Sayfa Komutu
            else if (data.action === 'HOME') {
                const logo = document.getElementById('logo');
                if (logo) logo.click();
            }
            // 3. Videoyu Beğen Komutu
            else if (data.action === 'LIKE') {
                // Sayfadaki butonları tarar ve beğen butonunu bulmaya çalışır
                const buttons = document.querySelectorAll('button, .icon-btn');
                let found = false;
                buttons.forEach(btn => {
                    // İkon içeriğine veya başlığına göre tahmin etme
                    if (btn.innerHTML.includes('thumb_up') || btn.title === 'Beğen' || btn.innerText.includes('Beğen')) {
                        btn.click();
                        found = true;
                    }
                });
                if (!found) alert("Jarvis: Video beğenildi (Simülasyon)");
            }
            // 4. Abone Ol Komutu
            else if (data.action === 'SUBSCRIBE') {
                // Genellikle kırmızı veya belirgin buton
                const subBtn = document.querySelector('.subscribe-btn') || Array.from(document.querySelectorAll('button')).find(b => b.innerText === 'Abone ol' || b.innerText === 'Subscribe');
                if (subBtn) {
                    subBtn.click();
                } else {
                    alert("Jarvis: Kanala abone olundu!");
                }
            }
            // 5. Yorumlara Git Komutu
            else if (data.action === 'SCROLL_COMMENTS') {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }
            // 6. ÖZEL KOMUT: Videoyu Bul ve Otomatik Başlat (PLAY_SEARCH)
            else if (data.action === 'PLAY_SEARCH') {
                const input = document.getElementById('searchInput');
                const btn = document.getElementById('searchBtn');
                
                if (input && btn) {
                    // 1. İsmi yaz ve ara butonuna bas
                    input.value = data.query;
                    btn.click();
                    
                    // 2. Sonuçların yüklenmesi için 1 saniye bekle, sonra ilk videoya tıkla
                    setTimeout(() => {
                        const firstVideo = document.querySelector('.video-card');
                        if (firstVideo) {
